services:
  wire:
    build: .
    ports:
      - "7823:80"
    restart: unless-stopped

  # Optional: bundled CORS proxy (use if you're not running cors-anywhere on Unraid)
  # Start with: docker compose --profile proxy up
  cors-proxy:
    build: ./cors-proxy
    ports:
      - "7824:7824"
    restart: unless-stopped
    profiles:
      - proxy
