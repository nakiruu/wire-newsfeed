services:
  wire:
    build: .
    ports:
      - "7823:80"
    restart: unless-stopped

  # Optional: bundled CORS proxy (use if you're not running cors-anywhere on Unraid)
  # Start with: docker compose --profile proxy up
  cors-proxy:
    image: node:22-alpine
    command: >
      sh -c "npm install -g cors-anywhere@0.4.4 2>/dev/null &&
             node -e \"require('cors-anywhere').createServer({originWhitelist:[]}).listen(7824,'0.0.0.0')\""
    ports:
      - "7824:7824"
    restart: unless-stopped
    profiles:
      - proxy
