server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Internal proxy paths — lets HTTPS reverse proxies reach internal HTTP services
    # without a mixed-content error. Nginx routes these to the Docker service names.
    # After updating, set Settings → CORS Proxy URL to: https://your-domain/corsproxy
    # and Settings → Article Extractor URL to: https://your-domain/extractor
    location /corsproxy/ {
        proxy_pass http://cors-proxy:7824/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /extractor/ {
        proxy_pass http://article-extractor:7825/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
